<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Praktikan</title>
    <link rel="stylesheet" href="Unguided1.css">
</head>
<body>
    <div class="form-container">
        <h2>Formulir Pendaftaran Praktikan</h2>
        <form action="#" method="post">
            <table>
                <tr>
                    <td><label for="nama">Nama</label></td>
                    <td>:</td>
                    <td><input type="text" id="nama" name="nama" value="Christoba joshua hutagalung"></td>
                </tr>
                <tr>
                    <td><label for="nim">NIM</label></td>
                    <td>:</td>
                    <td><input type="text" id="nim" name="nim" value="2311102133"></td>
                </tr>
                <tr>
                    <td><label for="username">Username</label></td>
                    <td>:</td>
                    <td><input type="text" id="username" name="username" placeholder="Praktikum"></td>
                </tr>
                <tr>
                    <td><label for="password">Password</label></td>
                    <td>:</td>
                    <td><input type="password" id="password" name="password" value=""></td>
                </tr>
                <tr>
                    <td><label for="email">Email</label></td>
                    <td>:</td>
                    <td><input type="email" id="email" name="email" placeholder="Input Email"></td>
                </tr>
                <tr>
                    <td>Jenis Kelamin</td>
                    <td>:</td>
                    <td>
                        <input type="radio" id="pria" name="kelamin" value="Pria" checked>
                        <label for="pria">Pria</label>
                        <input type="radio" id="wanita" name="kelamin" value="Wanita">
                        <label for="wanita">Wanita</label>
                    </td>
                </tr>
                <tr>
                    <td valign="top">Hobi</td>
                    <td valign="top">:</td>
                    <td>
                        <input type="checkbox" id="renang" name="hobi" value="Renang" checked>
                        <label for="renang">Renang</label><br>
                        <input type="checkbox" id="bersepeda" name="hobi" value="Bersepeda">
                        <label for="bersepeda">Bersepeda</label><br>
                        <input type="checkbox" id="memancing" name="hobi" value="Memancing" checked>
                        <label for="memancing">Memancing</label>
                    </td>
                </tr>
                <tr>
                    <td><label for="pendidikan">Jenjang Pendidikan</label></td>
                    <td>:</td>
                    <td>
                        <select id="pendidikan" name="pendidikan">
                            <option value="">------Pilih------</option>
                            <option value="D3">Tamat D3</option>
                            <option value="S1">Tamat S1</option>
                            <option value="S2">Tamat S2</option>
                            <option value="S3">Tamat S3</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td valign="top"><label for="kritik">Kritik & Saran</label></td>
                    <td valign="top">:</td>
                    <td>
                        <textarea id="kritik" name="kritik" rows="4"></textarea>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td></td>
                    <td class="buttons">
                        <button type="reset" class="btn-cancel">Cancel</button>
                        <button type="submit" class="btn-submit">Submit</button>
                    </td>
                </tr>
            </table>
        </form>
    </div>
</body>
</html>
